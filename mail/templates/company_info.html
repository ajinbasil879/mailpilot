{% extends "base.html" %}

{% block title %}Company Information - Mail Management System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-info text-white text-center">
                <h3 class="mb-0">
                    <i class="fas fa-building me-2"></i>Company Information
                </h3>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="company_name" class="form-label">
                                <i class="fas fa-building me-2"></i>Company Name *
                            </label>
                            <input type="text" class="form-control" id="company_name" name="company_name" 
                                   value="{{ company_info.company_name if company_info else '' }}" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="industry" class="form-label">
                                <i class="fas fa-industry me-2"></i>Industry
                            </label>
                            <input type="text" class="form-control" id="industry" name="industry" 
                                   value="{{ company_info.industry if company_info else '' }}">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="address" class="form-label">
                            <i class="fas fa-map-marker-alt me-2"></i>Address
                        </label>
                        <textarea class="form-control" id="address" name="address" rows="3">{{ company_info.address if company_info else '' }}</textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">
                                <i class="fas fa-phone me-2"></i>Phone
                            </label>
                            <input type="tel" class="form-control" id="phone" name="phone" 
                                   value="{{ company_info.phone if company_info else '' }}">
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="website" class="form-label">
                                <i class="fas fa-globe me-2"></i>Website
                            </label>
                            <input type="url" class="form-control" id="website" name="website" 
                                   value="{{ company_info.website if company_info else '' }}">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">
                            <i class="fas fa-align-left me-2"></i>Company Description
                        </label>
                        <textarea class="form-control" id="description" name="description" rows="4">{{ company_info.description if company_info else '' }}</textarea>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-info btn-lg">
                            <i class="fas fa-save me-2"></i>Save Company Information
                        </button>
                    </div>
                </form>
                
                <div class="text-center mt-3">
                    <p class="text-muted">
                        <i class="fas fa-info-circle me-1"></i>
                        Fields marked with * are required. You can update this information anytime.
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
